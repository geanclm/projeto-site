<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez JS - vs Computador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-area">
        <div class="left-panel">
            <div id="datetime" class="datetime"></div>
            <div class="game-info">
                <p>Vez de: <span id="current-player">Brancas</span></p>
                <p id="game-message" class="game-message"></p>
            </div>

            <!-- Painel de Configuração do Modo -->
            <div class="mode-panel">
                <h4>Modo de Jogo</h4>
                <div class="mode-buttons">
                    <button id="btn-pvp" class="mode-btn active">👥 2 Jogadores</button>
                    <button id="btn-pvc" class="mode-btn">🤖 vs Computador</button>
                </div>
                <div id="ai-options" class="ai-options hidden">
                    <label>Dificuldade:</label>
                    <div class="difficulty-buttons">
                        <button class="diff-btn active" data-depth="1">Fácil</button>
                        <button class="diff-btn" data-depth="2">Médio</button>
                        <button class="diff-btn" data-depth="3">Difícil</button>
                    </div>
                    <label>Jogar como:</label>
                    <div class="color-buttons">
                        <button class="color-btn active" data-color="white">♔ Brancas</button>
                        <button class="color-btn" data-color="black">♚ Pretas</button>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="undo-button" class="btn-secondary">↶ Desfazer</button>
                <button id="flip-board-button" class="btn-secondary">⇄ Inverter</button>
                <button id="restart-button">↺ Reiniciar</button>
                <button id="toggle-notation" class="btn-gray">Notação</button>
            </div>
            <div class="move-history-container">
                <h4>Histórico:</h4>
                <ul id="move-history"></ul>
            </div>
        </div>

        <div class="main-panel">
            <div id="captured-pieces-top" class="captured-pieces">
                <h4 id="captured-title-top">Capturadas (Brancas):</h4>
                <div class="captured-piece-container"></div>
                <span class="material-score" id="score-top"></span>
            </div>
            <div class="board-wrapper">
                <div id="thinking-overlay" class="thinking-overlay hidden">
                    <div class="thinking-spinner"></div>
                    <span>Computador pensando…</span>
                </div>
                <div class="board-container">
                    <div id="board" class="board"></div>
                </div>
            </div>
            <div id="captured-pieces-bottom" class="captured-pieces">
                <h4 id="captured-title-bottom">Capturadas (Pretas):</h4>
                <div class="captured-piece-container"></div>
                <span class="material-score" id="score-bottom"></span>
            </div>
        </div>
    </div>

    <div id="promotion-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h4>Promover Peão para:</h4>
            <button data-piece="queen">♛ Rainha</button>
            <button data-piece="rook">♜ Torre</button>
            <button data-piece="bishop">♝ Bispo</button>
            <button data-piece="knight">♞ Cavalo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
